<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Community Event Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>Local Community Event Portal</h1>
    <p>Browse upcoming events, register, and stay connected with your neighborhood.</p>
  </header>

  <section class="filters">
    <div>
      <label for="categoryFilter">Filter by category:</label>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>
    </div>
    <div>
      <label for="searchInput">Search by name:</label>
      <input id="searchInput" type="text" placeholder="Type and press Enter" />
    </div>
  </section>

  <section id="spinner" class="spinner hidden">Loading events...</section>
  <section id="eventCards" class="event-grid"></section>

  <section class="form-card">
    <h2>Register for an Event</h2>
    <form id="registrationForm">
      <label>
        Full Name
        <input name="name" type="text" placeholder="Your full name" required />
      </label>
      <label>
        Email Address
        <input name="email" type="email" placeholder="you@example.com" required />
      </label>
      <label>
        Event ID
        <input name="eventId" type="text" placeholder="Event ID" required />
      </label>
      <button id="registerBtn" type="submit">Submit Registration</button>
      <p id="formError" class="error-text"></p>
    </form>
  </section>

  <section id="statusMessage" class="status-message"></section>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
